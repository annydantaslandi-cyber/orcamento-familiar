<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orçamento Familiar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#e2e0f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#13111f;border:1px solid #2a2745;border-radius:16px;padding:28px;width:100%;max-width:400px;margin:20px}
h1{font-size:22px;font-weight:700;color:#f0eeff;margin-bottom:6px;text-align:center}
p{font-size:13px;color:#6b6a8a;text-align:center;margin-bottom:24px}
.tabs{display:flex;gap:3px;background:#0d0c1a;border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#4a4870}
.tab.active{background:linear-gradient(135deg,#3730a3,#6d28d9);color:#ddd6fe}
input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2a2745;background:#1a1730;color:#e2e0f0;font-size:14px;outline:none;margin-bottom:10px}
button.primary{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-size:15px;font-weight:700;margin-top:4px}
.error{color:#f87171;font-size:12px;text-align:center;margin-bottom:8px}
.icon{font-size:40px;text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">💰</div>
  <h1>Orçamento em Grupo</h1>
  <p id="subtitle">Dados salvos na nuvem ☁️</p>
  <div class="tabs">
    <button class="tab" id="tab-entrar" onclick="setMode('entrar')">Entrar</button>
    <button class="tab active" id="tab-criar" onclick="setMode('criar')">Criar conta</button>
  </div>
  <input type="text" id="nome" placeholder="Seu nome"/>
  <input type="password" id="pin" placeholder="PIN (4 números)" maxlength="4"/>
  <div class="error" id="erro"></div>
  <button class="primary" id="btn" onclick="entrar()">Criar e entrar →</button>
</div>

<script>
const SUPA = "https://ktwmitaifevjxhowyjpm.supabase.co";
const KEY = "sb_publishable_CCZ88Tb5JjzrjInAIvaiaw_cvDQZZG2";
const H = {"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json"};
let modo = "criar";

function setMode(m) {
  modo = m;
  document.getElementById("tab-entrar").className = "tab" + (m==="entrar"?" active":"");
  document.getElementById("tab-criar").className = "tab" + (m==="criar"?" active":"");
  document.getElementById("btn").textContent = m==="entrar" ? "Entrar →" : "Criar e entrar →";
  document.getElementById("erro").textContent = "";
}

async function entrar() {
  const nome = document.getElementById("nome").value.trim();
  const pin = document.getElementById("pin").value.replace(/\D/g,"");
  const erro = document.getElementById("erro");
  if(!nome || pin.length < 4) { erro.textContent = "Preencha nome e PIN (4 dígitos)"; return; }
  document.getElementById("btn").textContent = "...";
  erro.textContent = "";
  try {
    if(modo === "entrar") {
      const r = await fetch(`${SUPA}/rest/v1/membros?nome=eq.${encodeURIComponent(nome)}&pin=eq.${pin}`,{headers:H});
      const data = await r.json();
      if(!data?.length) { erro.textContent = "Nome ou PIN incorretos"; document.getElementById("btn").textContent = "Entrar →"; return; }
      abrirApp(data[0]);
    } else {
      const ex = await fetch(`${SUPA}/rest/v1/membros?nome=eq.${encodeURIComponent(nome)}`,{headers:H});
      const exData = await ex.json();
      if(exData?.length) { erro.textContent = "Nome já existe"; document.getElementById("btn").textContent = "Criar e entrar →"; return; }
      const all = await fetch(`${SUPA}/rest/v1/membros`,{headers:H});
      const allData = await all.json();
      const r = await fetch(`${SUPA}/rest/v1/membros`,{method:"POST",headers:{...H,Prefer:"return=representation"},body:JSON.stringify({nome,pin,is_admin:!allData?.length})});
      const novo = await r.json();
      if(!novo?.[0]) { erro.textContent = "Erro ao criar. Tenta de novo."; document.getElementById("btn").textContent = "Criar e entrar →"; return; }
      abrirApp(novo[0]);
    }
  } catch(e) { erro.textContent = "Erro de conexão com o banco de dados"; document.getElementById("btn").textContent = modo==="entrar"?"Entrar →":"Criar e entrar →"; }
}

function abrirApp(user) {
  document.body.innerHTML = `
    <div style="max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#09090f;width:100%">
      <div style="padding:16px 16px 0;background:linear-gradient(180deg,#13111f 0%,transparent 100%)">
        <div style="display:flex;align-items:center;gap:10;margin-bottom:14px">
          <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#db2777);display:flex;align-items:center;justify-content:center;font-size:18px">💰</div>
          <div style="flex:1;margin-left:10px">
            <div style="font-weight:700;font-size:15px;color:#f0eeff">Orçamento em Grupo</div>
            <div style="font-size:11px;color:#6b6a8a">Olá, ${user.nome}${user.is_admin?" 👑":""}</div>
          </div>
        </div>
        <div style="display:flex;gap:3px;background:#13111f;border-radius:12px;padding:3px;margin-bottom:0">
          <button onclick="showTab('chat')" id="t-chat" style="flex:1;padding:8px 2px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:linear-gradient(135deg,#3730a3,#6d28d9);color:#ddd6fe">💬 Chat</button>
          <button onclick="showTab('painel')" id="t-painel" style="flex:1;padding:8px 2px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#4a4870">📊 Painel</button>
          ${user.is_admin?`<button onclick="showTab('admin')" id="t-admin" style="flex:1;padding:8px 2px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#4a4870">👑 Admin</button>`:""}
        </div>
      </div>
      <div id="conteudo" style="flex:1;overflow-y:auto;padding:14px"></div>
    </div>
  `;
  window._user = user;
  window._webhook = "";
  showTab("chat");
  carregarDados();
}

function showTab(tab) {
  ["chat","painel","admin"].forEach(t => {
    const el = document.getElementById("t-"+t);
    if(el) el.style.background = t===tab?"linear-gradient(135deg,#3730a3,#6d28d9)":"transparent";
    if(el) el.style.color = t===tab?"#ddd6fe":"#4a4870";
  });
  window._tab = tab;
  renderTab();
}

async function carregarDados() {
  try {
    const [gr, mr] = await Promise.all([
      fetch(`${SUPA}/rest/v1/gastos?apagado=eq.false&order=criado_em.desc`,{headers:H}),
      fetch(`${SUPA}/rest/v1/membros`,{headers:H})
    ]);
    window._gastos = await gr.json() || [];
    window._members = await mr.json() || [];
  } catch { window._gastos = []; window._members = []; }
  renderTab();
  setTimeout(carregarDados, 10000);
}

const CATS = {
  casa:{l:"Casa",e:"🏠",c:"#60a5fa",b:"#1e3a5f"},
  beleza:{l:"Beleza",e:"💄",c:"#f472b6",b:"#4a1942"},
  saude:{l:"Saúde",e:"💊",c:"#34d399",b:"#064e3b"},
  alimentacao:{l:"Alimentação",e:"🍱",c:"#fbbf24",b:"#451a03"},
  transporte:{l:"Transporte",e:"🚌",c:"#a78bfa",b:"#2e1065"},
  lazer:{l:"Lazer",e:"🎮",c:"#fb923c",b:"#431407"},
  roupas:{l:"Roupas",e:"👗",c:"#e879f9",b:"#3b0764"},
  outros:{l:"Outros",e:"📦",c:"#94a3b8",b:"#1e293b"}
};

function fmtBRL(v){return v==null?"—":"R$ "+Number(v).toFixed(2).replace(".",",")}
function fmtDate(iso){return new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}
function detectCat(t){const l=t.toLowerCase();const kw={casa:["mercado","limpeza","luz","água","aluguel"],beleza:["shampoo","creme","perfume","maquiagem","cabelo"],saude:["remédio","farmácia","médico","vitamina"],alimentacao:["restaurante","delivery","ifood","lanche","pizza"],transporte:["ônibus","uber","gasolina"],lazer:["cinema","netflix","spotify","festa"],roupas:["roupa","tênis","sapato","bolsa"]};for(const[k,ws]of Object.entries(kw))if(ws.some(w=>l.includes(w)))return k;return"outros"}

function renderTab() {
  const tab = window._tab || "chat";
  const el = document.getElementById("conteudo");
  if(!el) return;
  if(tab==="chat") renderChat(el);
  else if(tab==="painel") renderPainel(el);
  else if(tab==="admin") renderAdmin(el);
}

let _msgs = null;
function renderChat(el) {
  if(!_msgs) _msgs = [{role:"ai",text:"Oi, "+window._user.nome+"! 👋 Me fala o que você gastou. Pode colocar tudo junto com vírgula e o preço se souber!",items:[]}];
  const msgsHtml = _msgs.map(m => {
    const isUser = m.role==="user";
    const itemsHtml = (m.items||[]).map(it => {
      const cat = CATS[it.categoria]||CATS.outros;
      const sp = it.valor==null||it.estimado;
      return `<div style="padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #111020;border-left:${sp?"3px solid #f97316":"3px solid transparent"}">
        <div style="width:26px;height:26px;border-radius:7px;background:${cat.b};display:flex;align-items:center;justify-content:center;font-size:13px">${cat.e}</div>
        <div style="flex:1"><div style="font-size:13px;color:#e2e0f0">${it.nome}</div><div style="font-size:11px;color:${cat.c}">${cat.l}${sp?" ~ estimado":""}</div></div>
        <div style="font-size:13px;font-weight:700;color:${sp?"#f97316":cat.c}">${it.valor==null?"💡":fmtBRL(it.valor)}</div>
      </div>`;
    }).join("");
    const itemsBox = m.items?.length ? `<div style="margin-top:8px;background:#13111f;border-radius:12px;border:1px solid #1e1d38;overflow:hidden"><div style="padding:6px 12px;font-size:11px;color:#34d399;border-bottom:1px solid #1a1930">✓ ${m.items.length} item(s) salvo(s) ☁️</div>${itemsHtml}</div>` : "";
    return `<div style="margin-bottom:12px;display:flex;justify-content:${isUser?"flex-end":"flex-start"}">
      <div style="max-width:86%">
        <div style="padding:10px 14px;border-radius:${isUser?"16px 16px 4px 16px":"16px 16px 16px 4px"};background:${isUser?"linear-gradient(135deg,#3730a3,#6d28d9)":"#13111f"};border:${isUser?"none":"1px solid #1e1d38"};font-size:14px;line-height:1.55;color:${isUser?"#ede9ff":"#d4d0f0"}">${m.text}</div>
        ${itemsBox}
      </div>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div style="display:flex;flex-direction:column;min-height:calc(100vh - 120px)">
      <div style="flex:1;overflow-y:auto" id="msgs-area">${msgsHtml}<div id="bottom"></div></div>
      <div style="padding:8px 0;margin-top:8px">
        <div style="display:flex;gap:8px;background:#13111f;border-radius:16px;padding:4px 4px 4px 14px;border:1px solid #1e1d38">
          <input type="text" id="msg-input" placeholder="Ex: shampoo R$28, mercado R$150..." style="flex:1;background:transparent;border:none;outline:none;color:#e2e0f0;font-size:14px"/>
          <button onclick="enviarMsg()" style="padding:8px 16px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff">→</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("bottom")?.scrollIntoView();
  document.getElementById("msg-input")?.addEventListener("keydown", e => { if(e.key==="Enter") enviarMsg(); });
}

async function enviarMsg() {
  const inp = document.getElementById("msg-input");
  const txt = inp?.value?.trim();
  if(!txt) return;
  inp.value = "";
  _msgs.push({role:"user",text:txt,items:[]});
  renderTab();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:`Você é assistente de orçamento. Extraia itens e responda APENAS JSON: {"resposta":"texto curto","itens":[{"nome":"nome","valor":número ou null,"estimado":true/false,"categoria":"casa|beleza|saude|alimentacao|transporte|lazer|roupas|outros"}]}`,messages:[{role:"user",content:txt}]})});
    const data = await res.json();
    let parsed;try{parsed=JSON.parse(data.content?.[0]?.text||"{}")}catch{parsed={resposta:"Anotado!",itens:[]}}
    const itens=[];
    for(const i of(parsed.itens||[])){
      const g={membro_id:window._user.id,membro_nome:window._user.nome,nome:i.nome,valor:i.valor??null,estimado:i.estimado??false,categoria:i.categoria||detectCat(i.nome),mes:new Date().toISOString().slice(0,7),apagado:false};
      const r=await fetch(`${SUPA}/rest/v1/gastos`,{method:"POST",headers:{...H,Prefer:"return=representation"},body:JSON.stringify(g)});
      const saved=await r.json();
      if(saved?.[0]){itens.push(saved[0]);if(window._webhook?.trim())try{await fetch(window._webhook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({membro:window._user.nome,item:saved[0].nome,categoria:CATS[saved[0].categoria]?.l,valor:saved[0].valor,data:new Date().toLocaleDateString("pt-BR")})})}catch{}}
    }
    await carregarDados();
    _msgs.push({role:"ai",text:parsed.resposta||"Registrado!",items:itens});
  } catch { _msgs.push({role:"ai",text:"Ops! Tenta de novo.",items:[]}); }
  renderTab();
}

function renderPainel(el) {
  const gastos = window._gastos || [];
  const members = window._members || [];
  const mes = new Date().toISOString().slice(0,7);
  const gastosMes = gastos.filter(g=>g.mes===mes);
  const totalMes = gastosMes.reduce((s,g)=>s+(g.valor||0),0);
  const totalMeu = gastosMes.filter(g=>g.membro_id===window._user.id).reduce((s,g)=>s+(g.valor||0),0);
  const porCat = {};
  gastosMes.forEach(g=>{if(!porCat[g.categoria])porCat[g.categoria]={total:0,count:0};porCat[g.categoria].total+=g.valor||0;porCat[g.categoria].count+=1});
  const totalF = Object.values(porCat).reduce((s,c)=>s+c.total,0);

  const catHtml = Object.entries(porCat).sort((a,b)=>b[1].total-a[1].total).map(([cat,data])=>{
    const c=CATS[cat]||CATS.outros;const pct=totalF>0?(data.total/totalF)*100:0;
    return `<div style="background:#13111f;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #1e1d38">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;background:${c.b};display:flex;align-items:center;justify-content:center;font-size:15px">${c.e}</div>
        <div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600;color:#e2e0f0">${c.l}</span><span style="font-size:14px;font-weight:700;color:${c.c}">${fmtBRL(data.total)}</span></div><div style="font-size:11px;color:#6b6a8a">${data.count} item(s) · ${pct.toFixed(0)}%</div></div>
      </div>
      <div style="height:4px;background:#1a1930;border-radius:2px"><div style="height:100%;width:${pct}%;background:${c.c};border-radius:2px"></div></div>
    </div>`;
  }).join("");

  const histHtml = gastos.slice(0,15).map(g=>{
    const cat=CATS[g.categoria]||CATS.outros;
    const pode = window._user.is_admin || g.membro_id===window._user.id;
    return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#13111f;border-radius:10px;margin-bottom:5px;border:1px solid #1e1d38;border-left:${g.estimado||g.valor==null?"3px solid #f97316":"3px solid transparent"}">
      <div style="font-size:15px">${cat.e}</div>
      <div style="flex:1"><div style="font-size:13px;color:#e2e0f0">${g.nome}</div><div style="font-size:11px;color:#6b6a8a">${g.membro_nome} · ${fmtDate(g.criado_em)}</div></div>
      <div style="font-size:13px;font-weight:700;color:${g.valor==null?"#f97316":cat.c}">${g.valor==null?"?":fmtBRL(g.valor)}</div>
      ${pode?`<button onclick="apagarGasto('${g.id}')" style="padding:3px 7px;border-radius:7px;border:1px solid #4a1942;background:transparent;color:#f87171;font-size:11px;cursor:pointer">🗑️</button>`:""}
    </div>`;
  }).join("");

  el.innerHTML = `
    <div style="background:linear-gradient(135deg,#1e1b38,#2d2652);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid #3730a3">
      <div style="display:flex;justify-content:space-between">
        <div><div style="font-size:11px;color:#6b6a8a;margin-bottom:3px">Total do grupo</div><div style="font-size:26px;font-weight:700;color:#c4b5fd">${fmtBRL(totalMes)}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:#6b6a8a;margin-bottom:3px">Meu gasto</div><div style="font-size:20px;font-weight:700;color:#f472b6">${fmtBRL(totalMeu)}</div></div>
      </div>
    </div>
    <div style="font-size:11px;color:#6b6a8a;margin-bottom:8px;font-weight:600">POR CATEGORIA</div>
    ${catHtml || '<div style="text-align:center;padding:20px;color:#3d3a5a;font-size:13px">Nenhum gasto este mês</div>'}
    <div style="font-size:11px;color:#6b6a8a;margin:12px 0 8px;font-weight:600">HISTÓRICO RECENTE</div>
    ${histHtml || '<div style="text-align:center;padding:20px;color:#3d3a5a;font-size:13px">Sem gastos ainda</div>'}
  `;
}

async function apagarGasto(id) {
  if(!confirm("Apagar este gasto?")) return;
  await fetch(`${SUPA}/rest/v1/gastos?id=eq.${id}`,{method:"PATCH",headers:{...H,Prefer:"return=representation"},body:JSON.stringify({apagado:true})});
  await carregarDados();
  renderTab();
}

function renderAdmin(el) {
  el.innerHTML = `
    <div style="font-weight:700;font-size:15px;color:#f0eeff;margin-bottom:14px">Painel Admin 👑</div>
    <div style="background:#13111f;border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid #f97316">
      <div style="font-size:13px;font-weight:700;color:#f0eeff;margin-bottom:4px">🤖 Telegram Webhook</div>
      <input type="text" id="wh-input" placeholder="https://hook.us1.make.com/..." value="${window._webhook||""}" style="margin-bottom:8px;font-size:11px;font-family:monospace"/>
      <div style="display:flex;gap:6px">
        <button onclick="salvarWebhook()" style="flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-weight:600;font-size:12px">Salvar</button>
        <button onclick="testarWebhook()" style="flex:1;padding:9px;border-radius:10px;border:1px solid #f97316;cursor:pointer;background:transparent;color:#f97316;font-weight:600;font-size:12px">Testar 🧪</button>
      </div>
      <div id="wh-msg" style="font-size:12px;margin-top:6px"></div>
    </div>
    <div style="font-size:11px;color:#6b6a8a;margin-bottom:8px;font-weight:600">MEMBROS (${(window._members||[]).length})</div>
    ${(window._members||[]).map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#13111f;border-radius:12px;margin-bottom:6px;border:1px solid #1e1d38">
      <div style="width:32px;height:32px;border-radius:50%;background:#2d2652;display:flex;align-items:center;justify-content:center;font-weight:700;color:#c4b5fd">${m.nome[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#e2e0f0">${m.nome}${m.is_admin?" 👑":""}</div></div>
      ${!m.is_admin?`<button onclick="removerMembro('${m.id}')" style="padding:5px 10px;border-radius:8px;border:1px solid #4a1942;background:transparent;color:#f87171;font-size:11px;cursor:pointer">remover</button>`:""}
    </div>`).join("")}
  `;
}

function salvarWebhook(){window._webhook=document.getElementById("wh-input").value.trim();document.getElementById("wh-msg").style.color="#34d399";document.getElementById("wh-msg").textContent="✓ Salvo!"}
async function testarWebhook(){const wh=document.getElementById("wh-input").value.trim();if(!wh){document.getElementById("wh-msg").textContent="Cole a URL primeiro";return}try{await fetch(wh,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({membro:"Admin",item:"Teste",emoji:"🧪",valor:0,data:new Date().toLocaleDateString("pt-BR")})});document.getElementById("wh-msg").style.color="#34d399";document.getElementById("wh-msg").textContent="✓ Teste enviado!"}catch{document.getElementById("wh-ms
