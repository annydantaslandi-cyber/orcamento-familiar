<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orçamento Familiar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#e2e0f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#13111f;border:1px solid #2a2745;border-radius:16px;padding:28px;width:100%;max-width:400px;margin:20px}
h1{font-size:22px;font-weight:700;color:#f0eeff;margin-bottom:6px;text-align:center}
p{font-size:13px;color:#6b6a8a;text-align:center;margin-bottom:24px}
.tabs{display:flex;gap:3px;background:#0d0c1a;border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#4a4870}
.tab.active{background:linear-gradient(135deg,#3730a3,#6d28d9);color:#ddd6fe}
input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2a2745;background:#1a1730;color:#e2e0f0;font-size:14px;outline:none;margin-bottom:10px}
button.primary{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-size:15px;font-weight:700;margin-top:4px}
.error{color:#f87171;font-size:12px;text-align:center;margin-bottom:8px}
.icon{font-size:40px;text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">💰</div>
  <h1>Orçamento em Grupo</h1>
  <p>Dados salvos na nuvem ☁️</p>
  <div class="tabs">
    <button class="tab" id="tab-entrar" onclick="setMode('entrar')">Entrar</button>
    <button class="tab active" id="tab-criar" onclick="setMode('criar')">Criar conta</button>
  </div>
  <input type="text" id="nome" placeholder="Seu nome"/>
  <input type="password" id="pin" placeholder="PIN (4 números)" maxlength="4"/>
  <div class="error" id="erro"></div>
  <button class="primary" id="btn" onclick="entrar()">Criar e entrar →</button>
</div>
